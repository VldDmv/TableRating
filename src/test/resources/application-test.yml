spring:
  main:
    allow-bean-definition-overriding: true

  # migrations are MySQL-flavoured; tests build the schema from the
  # entities on in-memory H2 instead
  flyway:
    enabled: false

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: false

logging:
  level:
    org.criticizer: DEBUG
    org.springframework.security: DEBUG
# Profile for browser (Playwright) tests: the real app on in-memory H2.
spring:
  datasource:
    url: jdbc:h2:mem:e2e;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create
    open-in-view: false

  flyway:
    enabled: false

server:
  port: 8080

logging:
  level:
    root: WARN
    org.criticizer: INFO

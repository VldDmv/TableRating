services:
  mysql:
    image: mysql:8.0
    container_name: tablerating-mysql
    environment:
      MYSQL_DATABASE: tablerating
      MYSQL_USER: tablerating
      MYSQL_PASSWORD: tablerating
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - tablerating-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "tablerating", "-ptablerating"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: tablerating-app
    ports:
      - "8080:8080"
    restart: on-failure
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/tablerating
      SPRING_DATASOURCE_USERNAME: tablerating
      SPRING_DATASOURCE_PASSWORD: tablerating
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      # fresh database: Flyway creates the schema and seeds tags/genres

volumes:
  tablerating-data:
